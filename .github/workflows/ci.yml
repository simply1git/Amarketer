name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml jsonschema
      - name: Validate KB entries
        run: python tools/validate_kb.py
      - name: Compliance lint (income claims + disclosures)
        run: python tools/check_content.py
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Build site
        working-directory: site
        run: |
          npm ci
          npm run build
