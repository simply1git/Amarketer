name: KB freshness check
on:
  schedule:
    - cron: "0 6 1 * *" # monthly, 1st at 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Run freshness check
        id: check
        run: |
          python tools/check_freshness.py > freshness.md || echo "expired=true" >> "$GITHUB_OUTPUT"
          cat freshness.md
      - name: Open issue with report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('freshness.md', 'utf8');
            const expired = '${{ steps.check.outputs.expired }}' === 'true';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `KB freshness report ${new Date().toISOString().slice(0,10)}${expired ? ' — EXPIRED ENTRIES' : ''}`,
              body,
              labels: ['kb-freshness'],
            });
